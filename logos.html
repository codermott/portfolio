<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="li4Otf08yTU9eOQvQXYke5dNniX5icwoqTWwQMBnrOs" />
    <meta name="description" content="See examples of logos I’ve worked on, showcasing my graphic designer skills.">
    <title>Graphic Design Projects</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="nav.css">
</head>
<body>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('navbar.html')
                .then(response => response.text())
                .then(data => {
                    document.body.insertAdjacentHTML('afterbegin', data);
                })
                .catch(error => console.error('Error loading navigation bar:', error));
        });
    </script>

    <main>
    <header class="hero" id="secondary-hero">
        <canvas id="polygon-canvas"></canvas>
        <h1>Logo Designs</h1>
    </header>


    <section id="graphic-grid-project-section" class="grid-project-section">

        <div class="grid-item"><img src="imgs/livtocreatetest-01.png" alt="LivtoCreate logo" onclick="openModal(this)"></div>
        <div class="grid-item"><img src="imgs/ramen shop-01.png" alt="Ramen Shop logo" onclick="openModal(this)"></div>
        <div class="grid-item"><img src="imgs/disaster test-01.png" alt="Disaster logo" onclick="openModal(this)"></div>
        <div class="grid-item"><img src="imgs/icecream test-01.png" alt="Ice cream logo" onclick="openModal(this)"></div>
        <div class="grid-item"><img src="imgs/raptor test-01.png" alt="Raptor logo" onclick="openModal(this)"></div>
        <div class="grid-item"><img src="imgs/counseling-01.png" alt="Counseling logo" onclick="openModal(this)"></div>


    </section>

    <div id="myModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="imgModal">
        <div id="caption"></div>
    </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetch('footer.html')
                .then(response => response.text())
                .then(data => {
                    document.body.insertAdjacentHTML('beforeend', data);
                })
                .catch(error => console.error('Error loading footer:', error));
        });
    </script>

    <script src="script.js"></script>
    
</body>
</html>
